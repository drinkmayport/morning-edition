<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Morning Edition</title>
<style>
  body { font-family: Georgia, serif; background: #0A0A0A; color: #F5F0E8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .wrap { text-align: center; padding: 2rem; }
  h1 { font-size: 4rem; color: #C8A96E; font-style: italic; margin-bottom: .5rem; }
  p { color: #888; margin-bottom: 2rem; letter-spacing: .1em; text-transform: uppercase; font-size: .85rem; }
  a { color: #C8A96E; font-size: 1.1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Morning Edition</h1>
  <p>Adult Beverage Intelligence · Daily</p>
  <p><a id="link" href="#">Loading today's edition…</a></p>
</div>
<script>
  const today = new Date().toISOString().split('T')[0];
  const link = document.getElementById('link');
  link.href = `magazines/${today}.html`;
  link.textContent = `Read today's edition →`;
</script>
</body>
</html>
